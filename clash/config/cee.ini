; =============================================================================
; Cee Clash/OpenClash 订阅转换模板
; 作者: Cee | https://cee.im
; 项目: https://github.com/ceeim/toolbox/tree/master/clash
; 适用: OpenClash Meta 内核 | Redir-Host 模式 | 绕过大陆 + 非 CN 优先代理
; =============================================================================
; 规则按从上到下的顺序匹配，先命中先生效
; 订阅转换远程配置 URL:
; https://raw.githubusercontent.com/ceeim/toolbox/master/clash/config/cee.ini
; =============================================================================

[custom]

; ── 1. 本地 / 局域网 ──────────────────────────────────────────────────────────
ruleset=🎯 全球直连,[]GEOSITE,private
ruleset=🎯 全球直连,[]GEOIP,private,no-resolve
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/UnBan.list
ruleset=🛑 广告拦截,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanAD.list
ruleset=🍃 应用净化,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanProgramAD.list

; ── 2. Steam：国内直连 → 其余走 🎮 Steam（不用 steam@cn，其含全球 steamserver/steamusercontent）
ruleset=🎯 全球直连,[]GEOSITE,category-game-platforms-download@cn
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ceeim/toolbox/master/clash/ruleset/SteamCN.list,28800
ruleset=🎮 Steam,[]GEOSITE,steam
ruleset=🎯 全球直连,https://raw.githubusercontent.com/Aethersailor/Custom_OpenClash_Rules/main/rule/Steam_CDN.list,28800

; ── 3. 自定义直连 / 代理 ───────────────────────────────────────────────────────
ruleset=🎯 全球直连,https://raw.githubusercontent.com/Aethersailor/Custom_OpenClash_Rules/main/rule/Custom_Direct.list,28800
ruleset=🚀 主要节点,https://raw.githubusercontent.com/Aethersailor/Custom_OpenClash_Rules/main/rule/Custom_Proxy.list,28800

; ── 4. 国内网站直连（社区维护，须在 GFW/境外兜底之前）────────────────────────
; ACL4SSR: https://github.com/ACL4SSR/ACL4SSR/tree/master/Clash
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaDomain.list,28800
